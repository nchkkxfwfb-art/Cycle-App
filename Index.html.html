<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Cycle App</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family: -apple-system, Arial; background:#fff5f8; text-align:center;}
.box {background:white; padding:20px; border-radius:20px; max-width:420px; margin:auto;}

input, select, button {
  padding:12px; margin:6px; width:90%; border-radius:12px; border:none;
}

.toggle-group button {background:#ffe4ec;}
.toggle-group button.active {background:#ffb6c1;}

.entry {
  background:#ffe4ec;
  margin:5px;
  padding:10px;
  border-radius:12px;
  font-size:13px;
}

.safe {color:green; font-weight:bold;}
.warn {color:red;}
.stat {background:#f9f9f9; padding:10px; border-radius:12px; margin:10px;}
</style>
</head>

<body>

<div class="box">

<h2>🌸 Cycle App</h2>

<input type="date" id="date">
<input type="number" id="temp" placeholder="Temperatur">

<select id="mucus">
<option value="0">trocken</option>
<option value="1">cremig</option>
<option value="2">spinnbar</option>
</select>

<div class="toggle-group">
<button id="peakBtn">⭐ Peak</button>
<button id="periodBtn">🩸 Periode</button>
<button id="disturbedBtn">⚠️ Gestört</button>
</div>

<button id="saveBtn">Speichern</button>

<h2 id="result">–</h2>
<div id="warning" class="warn"></div>

<h3>📈 Kurve</h3>
<canvas id="chart"></canvas>

<h3>📊 Statistik</h3>
<div id="stats"></div>

<h3>📅 Verlauf</h3>
<div id="list"></div>

<button id="backupBtn">Backup</button>
<input type="file" id="importFile">

</div>

<script>

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

// ===== ELEMENTE =====
const dateInput = document.getElementById("date");
const tempInput = document.getElementById("temp");
const mucusSelect = document.getElementById("mucus");

const peakBtn = document.getElementById("peakBtn");
const periodBtn = document.getElementById("periodBtn");
const disturbedBtn = document.getElementById("disturbedBtn");

const saveBtn = document.getElementById("saveBtn");
const resultEl = document.getElementById("result");
const warningEl = document.getElementById("warning");
const listEl = document.getElementById("list");
const chartCanvas = document.getElementById("chart");
const statsEl = document.getElementById("stats");

const backupBtn = document.getElementById("backupBtn");
const importFile = document.getElementById("importFile");

// ===== STATE =====
let data = JSON.parse(localStorage.getItem("cycleData")) || [];
let peak=false, period=false, disturbed=false;
let chart;

// ===== TOGGLES =====
peakBtn.onclick = () => {peak=!peak; peakBtn.classList.toggle("active");};
periodBtn.onclick = () => {period=!period; periodBtn.classList.toggle("active");};
disturbedBtn.onclick = () => {disturbed=!disturbed; disturbedBtn.classList.toggle("active");};

// ===== SAVE =====
function save(){
  localStorage.setItem("cycleData", JSON.stringify(data));
}

// ===== ADD =====
saveBtn.onclick = () => {
  let date = dateInput.value;
  let temp = parseFloat(tempInput.value);
  let mucus = parseInt(mucusSelect.value);

  if(!date || isNaN(temp)) return alert("Datum + Temperatur!");

  data.push({date,temp,mucus,peak,period,disturbed});
  data.sort((a,b)=> new Date(a.date)-new Date(b.date));

  save();

  peak=false; period=false; disturbed=false;
  peakBtn.classList.remove("active");
  periodBtn.classList.remove("active");
  disturbedBtn.classList.remove("active");

  render();
};

// ===== ZYKLEN =====
function splitCycles(){
  let cycles=[]; let current=[];
  data.forEach(d=>{
    if(d.period && current.length){cycles.push(current); current=[];}
    current.push(d);
  });
  if(current.length) cycles.push(current);
  return cycles;
}

function getCurrentCycle(){
  let cycles=splitCycles();
  return cycles[cycles.length-1] || [];
}

// ===== LOGIK =====
function validTemps(cycle){
  return cycle.map(d=>d.disturbed?null:d.temp);
}

function coverline(cycle,i){
  let vals=validTemps(cycle).slice(i-6,i).filter(v=>v!==null);
  if(vals.length<6)return null;
  return Math.max(...vals);
}

function tempRule(cycle){
  let temps=validTemps(cycle);
  for(let i=6;i<temps.length-2;i++){
    let c=coverline(cycle,i);
    if(!c)continue;
    let t1=temps[i],t2=temps[i+1],t3=temps[i+2],t4=temps[i+3];
    if(t1>c&&t2>c&&t3>c)return {index:i+2,cover:c};
    if(t1>c&&t2>c&&t3<=c&&t4>c)return {index:i+3,cover:c};
  }
  return null;
}

function mucusRule(cycle){
  let peakIndex=cycle.map(d=>d.peak).lastIndexOf(true);
  if(peakIndex===-1)return null;
  return peakIndex+3;
}

function isSafe(cycle){
  let t=tempRule(cycle);
  let m=mucusRule(cycle);
  if(!t||m===null)return false;
  return cycle.length-1>=Math.max(t.index,m);
}

// ===== CHART =====
function drawChart(cycle){
  let temps=cycle.map(d=>d.temp);
  let labels=cycle.map(d=>d.date);

  if(chart) chart.destroy();

  chart=new Chart(chartCanvas,{
    type:'line',
    data:{labels:labels,datasets:[{data:temps}]}
  });
}

// ===== STATS =====
function calcStats(){
  let cycles=splitCycles();
  if(cycles.length<2) return "Noch nicht genug Daten";
  let lengths=cycles.map(c=>c.length);
  let avg=Math.round(lengths.reduce((a,b)=>a+b)/lengths.length);
  return `<div class="stat">Ø Zykluslänge: ${avg} Tage</div>`;
}

// ===== RENDER =====
function render(){
  let cycle=getCurrentCycle();
  drawChart(cycle);
  resultEl.innerHTML=isSafe(cycle)?"🟢 SAFE":"🔴 WARTEN";
  statsEl.innerHTML=calcStats();
}

render();

</script>
</body>
</html>
