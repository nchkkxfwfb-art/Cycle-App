<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cycle</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(180deg,#fff1f6,#ffe4ec);
}

/* CONTAINER */
.container{
  max-width:420px;
  margin:0 auto;
  padding:16px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.9);
  border-radius:20px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 6px 16px rgba(0,0,0,0.05);
}

/* INPUTS */
input,select{
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:14px;
  border:none;
  background:#fff;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
}

.primary{
  background:#ff6b9a;
  color:white;
}

/* TOGGLES */
.row{
  display:flex;
  gap:8px;
}

.row button{
  flex:1;
  background:#ffe4ec;
}

.active{
  background:#ff8fb1 !important;
  color:white;
}

/* STATUS */
.badge{
  padding:10px 16px;
  border-radius:999px;
  display:inline-block;
}

.safe{background:#d4f8e8}
.warn{background:#ffd6dc}
.mid{background:#fff3cd}

/* ENTRY */
.entry{
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.top{
  display:flex;
  justify-content:space-between;
}

.actions button{
  width:auto;
  padding:6px 10px;
  margin-left:4px;
}

canvas{
  width:100%!important;
}
</style>
</head>

<body>

<div class="container">

<!-- STATUS -->
<div class="card">
<h3 id="cycleDay"></h3>
<div id="status"></div>
<p id="explain"></p>
</div>

<!-- INPUT -->
<div class="card">

<input type="date" id="date">
<input type="number" id="temp" placeholder="Temperatur">

<select id="mucus">
<option value="0">trocken</option>
<option value="1">cremig</option>
<option value="2">spinnbar</option>
</select>

<div class="row">
<button id="peakBtn">⭐</button>
<button id="periodBtn">🩸</button>
<button id="distBtn">⚠️</button>
</div>

<button class="primary" id="saveBtn">Speichern</button>

</div>

<!-- CHART -->
<div class="card">
<canvas id="chart"></canvas>
</div>

<!-- LIST -->
<div class="card">
<div id="list"></div>
</div>

</div>

<script>

// STATE
let data = JSON.parse(localStorage.getItem("cycleData")) || [];
let editIndex = null;

let peak=false, period=false, disturbed=false;
let chart=null;

// BUTTONS
const peakBtn=document.getElementById("peakBtn");
const periodBtn=document.getElementById("periodBtn");
const distBtn=document.getElementById("distBtn");

peakBtn.onclick=()=>{peak=!peak;peakBtn.classList.toggle("active");}
periodBtn.onclick=()=>{period=!period;periodBtn.classList.toggle("active");}
distBtn.onclick=()=>{disturbed=!disturbed;distBtn.classList.toggle("active");}

// SAVE
document.getElementById("saveBtn").onclick=()=>{

  let date=document.getElementById("date").value;
  let temp=parseFloat(document.getElementById("temp").value);
  let mucus=parseInt(document.getElementById("mucus").value);

  if(!date||isNaN(temp)){
    alert("Datum + Temperatur!");
    return;
  }

  let entry={date,temp,mucus,peak,period,disturbed};

  if(editIndex!==null){
    data[editIndex]=entry;
    editIndex=null;
  }else{
    data.push(entry);
  }

  data.sort((a,b)=>new Date(a.date)-new Date(b.date));

  localStorage.setItem("cycleData",JSON.stringify(data));

  reset();
  render();
};

// RESET INPUT
function reset(){
  document.getElementById("date").value="";
  document.getElementById("temp").value="";
  document.getElementById("mucus").value=0;

  peak=period=disturbed=false;

  peakBtn.classList.remove("active");
  periodBtn.classList.remove("active");
  distBtn.classList.remove("active");
}

// DELETE
function deleteEntry(i){
  data.splice(i,1);
  save();
}

// EDIT
function editEntry(i){
  let d=data[i];

  document.getElementById("date").value=d.date;
  document.getElementById("temp").value=d.temp;
  document.getElementById("mucus").value=d.mucus;

  peak=d.peak;period=d.period;disturbed=d.disturbed;

  peakBtn.classList.toggle("active",peak);
  periodBtn.classList.toggle("active",period);
  distBtn.classList.toggle("active",disturbed);

  editIndex=i;
}

// SAVE
function save(){
  localStorage.setItem("cycleData",JSON.stringify(data));
  render();
}

// CYCLE FIX
function splitCycles(){
  let cycles=[],current=[];

  for(let i=0;i<data.length;i++){
    let d=data[i];
    let prev=data[i-1];

    if(d.period && (!prev || !prev.period)){
      if(current.length){
        cycles.push(current);
        current=[];
      }
    }

    current.push(d);
  }

  if(current.length) cycles.push(current);

  return cycles;
}

function getCycle(){
  let c=splitCycles();
  return c[c.length-1]||[];
}

// STATUS
function getStatus(day){
  if(day<7)return["FRUCHTBAR","warn","Fruchtbare Phase"];
  if(day<14)return["UNSICHER","mid","Übergang"];
  return["UNFRUCHTBAR","safe","Nach Hochlage"];
}

// CHART
function drawChart(cycle){

  let temps=cycle.map(d=>d.disturbed?null:d.temp);
  let labels=cycle.map(d=>d.date);

  if(chart)chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:'line',
    data:{labels,datasets:[{data:temps,tension:0.3}]}
  });
}

// RENDER
function render(){

  let cycle=getCycle();

  document.getElementById("cycleDay").innerText="Tag "+cycle.length;

  let s=getStatus(cycle.length);

  document.getElementById("status").innerHTML=
    `<span class="badge ${s[1]}">${s[0]}</span>`;

  document.getElementById("explain").innerText=s[2];

  drawChart(cycle);

  let html="";
  data.forEach((d,i)=>{
    html+=`
    <div class="entry">
      <div class="top">
        <div>${d.date} | ${d.temp}°C</div>
        <div class="actions">
          <button onclick="editEntry(${i})">✏️</button>
          <button onclick="deleteEntry(${i})">❌</button>
        </div>
      </div>
      <div>
        ${["trocken","cremig","spinnbar"][d.mucus]}
        ${d.peak?"⭐":""}
        ${d.period?"🩸":""}
        ${d.disturbed?"⚠️":""}
      </div>
    </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
}

// INIT
render();

</script>

</body>
</html>
