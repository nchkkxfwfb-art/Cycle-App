<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Cycle</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
* { box-sizing: border-box; }

@font-face {
  font-family: 'Congenial';
  src: local('Congenial UltraLight');
}

body {
  font-family: 'Congenial', -apple-system;
  background: linear-gradient(180deg, #fff1f6, #ffe4ec);
  margin:0;
}

.container {
  padding:16px;
  max-width:500px;
  margin:0 auto;
}

.card {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(12px);
  border-radius:24px;
  padding:20px;
  margin-bottom:18px;
  box-shadow:0 8px 24px rgba(255, 105, 135, 0.1);
}

h2,h3 { margin:0 0 12px 0; font-weight:300; }

/* INPUTS */
input, select {
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:16px;
  border:none;
  background:#fff;
}

/* BUTTON */
button {
  width:100%;
  padding:14px;
  border-radius:16px;
  border:none;
}

/* SAVE BUTTON */
.primary {
  background: linear-gradient(135deg, #ff8fb1, #ff6b9a);
  color:white;
  box-shadow: 0 6px 16px rgba(255,105,135,0.3);
  margin-top:10px;
  margin-bottom:18px;
}

/* TOGGLES */
.toggle-row {
  display:flex;
  gap:10px;
  margin-bottom:14px;
}

.toggle-row button {
  flex:1;
  background:#ffe4ec;
  font-size:18px;
  padding:12px;
}

.toggle-row button.active {
  background: linear-gradient(135deg,#ffb6c1,#ff8fb1);
  color:white;
}

/* STATUS */
#result {
  margin-top:12px;
  font-size:20px;
}

.safe { color:#3cb371; }
.warn { color:#ff4d6d; }

/* ENTRIES */
.entry {
  padding:14px 0;
  border-bottom:1px solid rgba(0,0,0,0.05);
}

.entry-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.actions {
  display:flex;
  gap:6px;
}

.actions button {
  width:auto;
  padding:6px 10px;
  font-size:14px;
  background:#ffe4ec;
}

/* STATS */
.stat {
  font-size:14px;
  margin-bottom:6px;
}

/* CHART */
canvas {
  display:block;
  width:100%!important;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>🌸 Cycle</h2>

<input type="date" id="date">
<input type="number" id="temp" placeholder="Temperatur">

<select id="mucus">
<option value="0">trocken</option>
<option value="1">cremig</option>
<option value="2">spinnbar</option>
</select>

<div class="toggle-row">
<button id="peakBtn">⭐</button>
<button id="periodBtn">🩸</button>
<button id="disturbedBtn">⚠️</button>
</div>

<button class="primary" id="saveBtn">Speichern</button>

<h2 id="result">–</h2>
<div id="warning" class="warn"></div>
</div>

<div class="card">
<h3>📊 Analyse</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>📈 Kurve</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>📅 Verlauf</h3>
<div id="list"></div>
</div>

</div>

<script>

// STATE
let data = JSON.parse(localStorage.getItem("cycleData")) || [];
let editIndex = null;

let peak=false, period=false, disturbed=false;
let chart=null;

// ELEMENTE
const dateInput = document.getElementById("date");
const tempInput = document.getElementById("temp");
const mucusSelect = document.getElementById("mucus");

const peakBtn = document.getElementById("peakBtn");
const periodBtn = document.getElementById("periodBtn");
const disturbedBtn = document.getElementById("disturbedBtn");

const saveBtn = document.getElementById("saveBtn");
const resultEl = document.getElementById("result");
const warningEl = document.getElementById("warning");
const listEl = document.getElementById("list");
const chartCanvas = document.getElementById("chart");
const statsEl = document.getElementById("stats");

// TOGGLES
peakBtn.onclick = () => { peak=!peak; peakBtn.classList.toggle("active"); };
periodBtn.onclick = () => { period=!period; periodBtn.classList.toggle("active"); };
disturbedBtn.onclick = () => { disturbed=!disturbed; disturbedBtn.classList.toggle("active"); };

// SAVE
function save(){
  localStorage.setItem("cycleData", JSON.stringify(data));
}

// ADD / EDIT
saveBtn.onclick = () => {

  let date = dateInput.value;
  let temp = parseFloat(tempInput.value);
  let mucus = parseInt(mucusSelect.value);

  if(!date || isNaN(temp)){
    alert("Datum + Temperatur!");
    return;
  }

  let entry = {date,temp,mucus,peak,period,disturbed};

  if(editIndex !== null){
    data[editIndex] = entry;
    editIndex = null;
  } else {
    data.push(entry);
  }

  data.sort((a,b)=> new Date(a.date)-new Date(b.date));

  save();
  resetInputs();
  render();
};

// RESET
function resetInputs(){
  dateInput.value="";
  tempInput.value="";
  mucusSelect.value="0";
  peak=false; period=false; disturbed=false;
  peakBtn.classList.remove("active");
  periodBtn.classList.remove("active");
  disturbedBtn.classList.remove("active");
}

// DELETE / EDIT
function deleteEntry(i){ data.splice(i,1); save(); render(); }

function editEntry(i){
  let d = data[i];
  dateInput.value = d.date;
  tempInput.value = d.temp;
  mucusSelect.value = d.mucus;
  peak=d.peak; period=d.period; disturbed=d.disturbed;
  peakBtn.classList.toggle("active", peak);
  periodBtn.classList.toggle("active", period);
  disturbedBtn.classList.toggle("active", disturbed);
  editIndex = i;
}

// ZYKLEN
function splitCycles(){
  let cycles = [];
  let current = [];

  for(let i = 0; i < data.length; i++){
    let d = data[i];
    let prev = data[i-1];

    // neuer Zyklus NUR wenn vorher KEINE Periode war
    if(d.period && (!prev || !prev.period)){
      if(current.length){
        cycles.push(current);
        current = [];
      }
    }

    current.push(d);
  }

  if(current.length) cycles.push(current);

  return cycles;
}

// LOGIK
function validTemps(cycle){
  return cycle.map(d=>d.disturbed?null:d.temp);
}

function coverline(cycle,i){
  let vals=validTemps(cycle).slice(i-6,i).filter(v=>v!==null);
  if(vals.length<6)return null;
  return Math.max(...vals);
}

function tempRule(cycle){
  let temps=validTemps(cycle);

  for(let i=6;i<temps.length-2;i++){
    let c=coverline(cycle,i);
    if(!c)continue;

    let t1=temps[i],t2=temps[i+1],t3=temps[i+2],t4=temps[i+3];

    if(t1>c&&t2>c&&t3>c)return {index:i+2,cover:c};
    if(t1>c&&t2>c&&t3<=c&&t4>c)return {index:i+3,cover:c};
  }
  return null;
}

function mucusRule(cycle){
  let peakIndex=cycle.map(d=>d.peak).lastIndexOf(true);
  if(peakIndex===-1)return null;
  return peakIndex+3;
}

// ANALYSE
function cycleLength(cycle){ return cycle.length; }

function avgCycleLength(){
  let cycles = splitCycles();
  if(cycles.length<2)return "-";
  let lengths = cycles.slice(0,-1).map(c=>c.length);
  return Math.round(lengths.reduce((a,b)=>a+b,0)/lengths.length);
}

function highPhaseLength(cycle){
  let t=tempRule(cycle);
  if(!t)return "-";
  return cycle.length - t.index;
}

function peakDay(cycle){
  let i=cycle.map(d=>d.peak).lastIndexOf(true);
  return i===-1 ? "-" : i+1;
}

function warnings(cycle){
  let w=[];
  if(cycle.length<7) w.push("zu wenig Daten");
  if(!tempRule(cycle)) w.push("kein Anstieg");
  if(mucusRule(cycle)===null) w.push("kein Peak");
  if(cycle.filter(d=>d.disturbed).length>3) w.push("viele Störungen");
  return w.join(" | ");
}

function isSafe(cycle){
  let t=tempRule(cycle);
  let m=mucusRule(cycle);
  if(!t||m===null)return false;
  return cycle.length-1>=Math.max(t.index,m);
}

// CHART
function drawChart(cycle){

  let ctx = chartCanvas.getContext("2d");

  let temps = cycle.map(d=>d.temp);
  let labels = cycle.map(d=>d.date);

  let high=tempRule(cycle);

  let highPhase = temps.map((v,i)=>{
    if(high && i>=high.index) return v;
    return null;
  });

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[
        {data:temps, tension:0.3},
        {data:highPhase, borderColor:"#ff6b9a"}
      ]
    }
  });
}

// RENDER
function render(){

  let cycle=getCurrentCycle();

  drawChart(cycle);

  statsEl.innerHTML = `
    <div class="stat">Zyklus: ${cycleLength(cycle)} Tage</div>
    <div class="stat">Ø Zyklus: ${avgCycleLength()}</div>
    <div class="stat">Hochlage: ${highPhaseLength(cycle)} Tage</div>
    <div class="stat">Peak: Tag ${peakDay(cycle)}</div>
  `;

  warningEl.innerText = warnings(cycle);

  listEl.innerHTML="";
  data.forEach((d,i)=>{
    listEl.innerHTML+=`
      <div class="entry">
        <div class="entry-top">
          <div>${d.date} | ${d.temp}°C</div>
          <div class="actions">
            <button onclick="editEntry(${i})">✏️</button>
            <button onclick="deleteEntry(${i})">❌</button>
          </div>
        </div>
        <div>
          ${["trocken","cremig","spinnbar"][d.mucus]}
          ${d.peak?"⭐":""}
          ${d.period?"🩸":""}
        </div>
      </div>
    `;
  });

  resultEl.innerHTML = isSafe(cycle)
    ? "<span class='safe'>🟢 SAFE</span>"
    : "🔴 WARTEN";
}

render();

</script>

</body>
</html>
