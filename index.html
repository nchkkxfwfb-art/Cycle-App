<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cycle</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(180deg,#fff1f6,#ffe4ec);
}

/* PAGES */
.page{display:none;padding:18px;padding-bottom:90px;}
.page.active{display:block}

/* CARD */
.card{
  background:white;
  border-radius:20px;
  padding:16px;
  margin-bottom:16px;
}

/* INPUT */
input,select,button{
  width:100%;
  padding:14px;
  margin:6px 0;
  border-radius:14px;
  border:none;
}

/* BUTTON */
.primary{
  background:#ff6b9a;
  color:white;
}

/* ROW */
.row{display:flex;gap:8px}
.row button{flex:1}

/* BADGE */
.badge{
  padding:10px 16px;
  border-radius:999px;
}

.safe{background:#d4f8e8}
.warn{background:#ffd6dc}
.mid{background:#fff3cd}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:white;
  border-top:1px solid #eee;
}
.nav button{flex:1}

/* CALENDAR */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.fertile{background:#ffd6dc}
.safeDay{background:#d4f8e8}
.midDay{background:#fff3cd}

canvas{width:100%!important}
</style>
</head>

<body>

<!-- HOME -->
<div class="page active" id="home">

<div class="card">
<h2 id="cycleDay"></h2>
<div id="status"></div>
<p id="explain"></p>
</div>

<div class="card">
<input type="date" id="date">
<input type="number" id="temp" placeholder="Temperatur">

<select id="mucus">
<option value="0">trocken</option>
<option value="1">cremig</option>
<option value="2">spinnbar</option>
</select>

<div class="row">
<button onclick="toggle('peak')">⭐</button>
<button onclick="toggle('period')">🩸</button>
<button onclick="toggle('dist')">⚠️</button>
</div>

<button class="primary" onclick="saveEntry()">Speichern</button>
</div>

</div>

<!-- ANALYSE -->
<div class="page" id="analysis">
<div class="card">
<h3>Analyse</h3>
<div id="insights"></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>
</div>

<!-- CALENDAR -->
<div class="page" id="calendar">
<div class="card">
<h3>Monat</h3>
<div id="calendarGrid" class="calendar"></div>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="showPage('home')">🏠</button>
<button onclick="showPage('analysis')">📈</button>
<button onclick="showPage('calendar')">📅</button>
</div>

<script>

// STATE
let data = JSON.parse(localStorage.getItem("cycleData")) || [];
let peak=false, period=false, disturbed=false;
let chart=null;

// NAV
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// TOGGLE
function toggle(t){
  if(t==="peak") peak=!peak;
  if(t==="period") period=!period;
  if(t==="dist") disturbed=!disturbed;
}

// SAVE
function saveEntry(){

  let date=document.getElementById("date").value;
  let temp=parseFloat(document.getElementById("temp").value);
  let mucus=parseInt(document.getElementById("mucus").value);

  if(!date || isNaN(temp)){
    alert("Datum + Temperatur!");
    return;
  }

  data.push({date,temp,mucus,peak,period,disturbed});
  data.sort((a,b)=> new Date(a.date)-new Date(b.date));

  localStorage.setItem("cycleData",JSON.stringify(data));

  peak=false; period=false; disturbed=false;

  render();
}

// FIXED CYCLE LOGIC
function splitCycles(){
  let cycles = [];
  let current = [];

  for(let i=0;i<data.length;i++){
    let d = data[i];
    let prev = data[i-1];

    if(d.period && (!prev || !prev.period)){
      if(current.length){
        cycles.push(current);
        current = [];
      }
    }

    current.push(d);
  }

  if(current.length) cycles.push(current);

  return cycles;
}

function getCycle(){
  let cycles = splitCycles();
  return cycles[cycles.length-1] || [];
}

// STATUS
function getStatus(day){
  if(day<7) return "fertile";
  if(day<14) return "mid";
  return "safe";
}

// HOME
function renderHome(){
  let c=getCycle();

  document.getElementById("cycleDay").innerText="Tag "+c.length;

  let s=getStatus(c.length);

  let map={
    fertile:["FRUCHTBAR","warn","Fruchtbare Phase"],
    mid:["UNSICHER","mid","Übergangsphase"],
    safe:["UNFRUCHTBAR","safe","Nach Hochlage"]
  };

  let m=map[s];

  document.getElementById("status").innerHTML=
    `<span class="badge ${m[1]}">${m[0]}</span>`;

  document.getElementById("explain").innerText=m[2];
}

// CHART
function renderChart(){
  let c=getCycle();

  let temps=c.map(d=>d.disturbed?null:d.temp);
  let labels=c.map(d=>d.date);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:'line',
    data:{
      labels,
      datasets:[
        {
          label:"Temp",
          data:temps,
          tension:0.3
        }
      ]
    }
  });
}

// CALENDAR
function renderCalendar(){

  let grid=document.getElementById("calendarGrid");
  grid.innerHTML="";

  let now=new Date();
  let days=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

  for(let i=1;i<=days;i++){

    let s=getStatus(i);

    let cls = s==="fertile" ? "fertile"
             : s==="mid" ? "midDay"
             : "safeDay";

    grid.innerHTML += `<div class="day ${cls}">${i}</div>`;
  }
}

// INSIGHTS
function renderInsights(){
  let c=getCycle();
  document.getElementById("insights").innerHTML=
    `Zyklus: ${c.length} Tage<br>Einträge: ${data.length}`;
}

// RENDER
function render(){
  renderHome();
  renderChart();
  renderCalendar();
  renderInsights();
}

// INIT
render();

</script>

</body>
</html>
